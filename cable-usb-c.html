<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cable USB C + Cabezal - Detalle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; margin:0; padding:20px; background:#fff; color:#111; }
img { width:100%; max-width:400px; border-radius:20px; display:block; margin:0 auto; }
h1 { margin-top:20px; text-align:center; }
p { text-align:center; color:#666; }
button{ background:#111; color:white; border:none; padding:12px; width:100%; border-radius:20px; margin-top:10px; cursor:pointer; font-size:16px; display:block; margin:20px auto; max-width:300px;}
button:hover{ background:#333; }
a{ display:block; margin-top:20px; color:#111; text-decoration:none; font-weight:bold; text-align:center; }
</style>
</head>
<body>

<img src="cable-usb-c.JPG" alt="Cable USB C">
<h1>Cable USB C + Cabezal</h1>
<p>Precio: $18.000</p>
<p>Descripción detallada del producto: Cable resistente y rápido, incluye cabezal de carga, compatible con múltiples dispositivos.</p>

<button onclick="agregarAlCarrito()">Agregar al carrito</button>
<a href="index.html">← Volver a la tienda</a>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardarCarrito(){ localStorage.setItem("carrito", JSON.stringify(carrito)); }

function agregarAlCarrito(){
  let nombre = "Cable USB C";
  let precio = 18000;
  let encontrado=false;
  for(let i=0;i<carrito.length;i++){
    if(carrito[i].nombre===nombre){
      carrito[i].cantidad++;
      encontrado=true;
    }
  }
  if(!encontrado){
    carrito.push({nombre:nombre,precio:precio,cantidad:1});
  }
  guardarCarrito();
  alert(nombre + " agregado al carrito");
}
</script>

</body>
</html>
