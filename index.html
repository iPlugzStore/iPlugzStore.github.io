/* RESET Y BODY */
html, body {
  margin:0;
  padding:0;
  overflow-x:hidden;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#ffffff;
  color:#111;
}

/* HEADER */
header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
  position:relative;
  z-index:10;
}

.logo{
  font-size:22px;
  font-weight:600;
  letter-spacing:1px;
}

#carritoIcono{
  cursor:pointer;
  position:relative;
  font-size:24px;
}

#contador{
  position:absolute;
  top:-8px;
  right:-10px;
  background:#111;
  color:white;
  border-radius:50%;
  padding:3px 6px;
  font-size:12px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:24px;
  font-weight:500;
}

.hero p{
  color:#666;
  margin-top:10px;
}

/* PRODUCTOS */
.productos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
  box-sizing:border-box;
}

.producto{
  width:100%;
  max-width:260px;
  text-align:center;
  box-sizing:border-box;
}

.producto img{
  width:100%;
  border-radius:20px;
  transition:0.3s;
}

.producto img:hover{
  transform:scale(1.05);
}

.producto h3{
  margin:15px 0 5px;
  font-weight:500;
}

.producto p{
  color:#666;
}

button{
  background:#111;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
}

button:hover{
  background:#333;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:99;
}
