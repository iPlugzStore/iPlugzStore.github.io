<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* BASE */
* { box-sizing: border-box; }
html, body { margin:0; padding:0; font-family:'Helvetica Neue', sans-serif; background:#f5f6fa; color:#111; overflow-x:hidden; scroll-behavior:smooth; }
.contenedor { max-width:1100px; margin:0 auto; padding:0 16px; }
a { text-decoration:none; color:inherit; }

/* HEADER CON LOGO CENTRADO */
header {
  position: fixed; top:0; left:0; width:100%;
  background: #111; padding:12px 0;
  color:white; z-index:1000; box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header-content {
  display: grid;
  grid-template-columns: 1fr auto 1fr; /* Divide en 3 partes: Izquierda, Centro (auto), Derecha */
  align-items: center;
  padding: 0 20px;
}

/* Tres rayitas (Menú) */
#menuIcono {
  font-size: 28px;
  cursor: pointer;
  justify-self: start; /* Pegado a la izquierda */
  transition: color 0.3s;
}

/* Logo al Centro */
.logo {
  font-size: 26px; 
  font-weight: 900; 
  text-transform: uppercase;
  background: linear-gradient(90deg,#4A90E2,#50E3C2);
  -webkit-background-clip:text; 
  -webkit-text-fill-color:transparent;
  justify-self: center; /* Exactamente al centro */
  letter-spacing: 1px;
}

/* Carrito a la Derecha */
#carritoIcono { 
  font-size:24px; 
  position:relative; 
  cursor:pointer; 
  justify-self: end; /* Pegado a la derecha */
  margin-right: 8px;
}

#contador { 
  position:absolute; top:-5px; right:-12px; 
  background:#50E3C2; color:white; 
  padding:2px 6px; border-radius:50%; 
  font-size:11px; font-weight:bold; 
}

/* ESPACIO PARA EL CONTENIDO */
body > .contenido { padding-top:80px; }

/* HERO */
.hero {
  text-align:center; padding:90px 20px; 
  border-radius:0 0 40px 40px;
  margin-bottom:40px; color:white;
  background: linear-gradient(135deg,#4A90E2,#50E3C2);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}
@keyframes gradientBG { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

/* PRODUCTOS */
.productos { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding-bottom:100px; }
.producto {
  background:#fff; border-radius:24px; box-shadow:0 8px 20px rgba(0,0,0,0.07);
  overflow:hidden; width:100%; max-width:280px; text-align:center; 
  transition: transform 0.3s, opacity 0.6s; opacity:0; transform: translateY(20px);
}
.producto.visible { opacity:1; transform: translateY(0); }
.producto img { width:100%; display:block; }
.btn-agregar { width:90%; padding:12px; margin:10px auto 15px; border:none; border-radius:24px; font-size:16px; font-weight:bold; background:#50E3C2; color:#fff; display:block; cursor:pointer; }

/* MENÚ LATERAL (Opciones) */
#menuLateral {
  position:fixed; top:0; left:0; width:280px; height:100%;
  background:white; box-shadow:5px 0 25px rgba(0,0,0,0.2);
  transform: translateX(-100%); transition: transform 0.3s ease; z-index:2001;
  padding:30px;
}
#menuLateral.abierto { transform: translateX(0); }
#menuLateral ul { list-style:none; padding:0; margin-top:40px; }
#menuLateral li { margin-bottom:25px; font-size:18px; font-weight:bold; border-bottom:1px solid #f0f0f0; padding-bottom:10px; }

/* OVERLAY PARA MENÚ Y CARRITO */
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:1999; }

/* CARRITO LATERAL */
#carrito {
  position:fixed; top:0; right:0; width:85%; max-width:320px; height:100%;
  background:white; box-shadow:-5px 0 25px rgba(0,0,0,0.3); padding:20px;
  transform: translateX(100%); transition: transform 0.3s ease; overflow-y:auto; z-index:2000;
}
#carrito.abierto { transform: translateX(0); }

/* BOTON FLOTANTE CENTRADO */
#btnFlotante {
  position:fixed; bottom:20px; left: 50%; transform: translateX(-50%);
  background:#4A90E2; color:#fff; border:none; padding:15px 30px; border-radius:50px; 
  font-size:17px; font-weight:bold; box-shadow:0 8px 25px rgba(0,0,0,0.3); z-index:1001;
  min-width: 200px; cursor:pointer;
}

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:40px 20px 120px; }

/* FLY ANIMATION */
.flyImg { position:fixed; border-radius:50%; z-index:9999; pointer-events:none; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
</style>
</head>
<body>

<header>
  <div class="header-content contenedor">
    <div id="menuIcono" onclick="abrirMenu()">☰</div>
    <div class="logo">iPlugz</div>
    <div id="carritoIcono" onclick="abrirCarrito()">🛒<span id="contador">0</span></div>
  </div>
</header>

<div id="menuLateral">
  <div style="font-size:24px; cursor:pointer; text-align:right;" onclick="cerrarTodo()">&times;</div>
  <div class="logo" style="background:none; -webkit-text-fill-color:#111; margin-bottom:20px;">iPlugz</div>
  <ul>
    <li><a href="#">Inicio</a></li>
    <li><a href="#">Productos</a></li>
    <li><a href="#">Novedades</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>
</div>

<div class="contenido contenedor">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <h2 style="text-align:center; margin-bottom:25px;">Destacados</h2>
  <div class="productos">
    <div class="producto"><img src="airpods-pro2.JPG" alt="Airpods Pro 2"><h3>Airpods Pro 2</h3><p>$35.000</p><button class="btn-agregar" onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button></div>
    <div class="producto"><img src="airpods-maxx.JPG" alt="Airpods Maxx"><h3>Airpods Maxx</h3><p>$45.000</p><button class="btn-agregar" onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button></div>
    <div class="producto"><img src="cable-usb-c.JPG" alt="Cable USB C"><h3>Cable USB C</h3><p>$18.000</p><button class="btn-agregar" onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button></div>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Ver Carrito</button>

<div id="overlay" onclick="cerrarTodo()"></div>

<div id="carrito">
  <h3 style="border-bottom: 2px solid #f5f6fa; padding-bottom: 10px;">Tu Carrito</h3>
  <div id="items"></div>
  <h4 id="total" style="font-size: 20px; margin: 20px 0;">Total: $0</h4>
  <button class="btn-agregar" onclick="cerrarTodo()" style="background:#666;">Cerrar</button>
  <button class="btn-agregar" onclick="vaciar()" style="background:#ff4757;">Vaciar Carrito</button>
</div>

<footer>
  &copy; 2026 iPlugz • <br><br>
  <a href="#">Facebook</a> • <a href="#">Instagram</a> • <a href="#">Twitter</a>
</footer>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function abrirMenu() {
  document.getElementById("menuLateral").classList.add("abierto");
  document.getElementById("overlay").style.display = "block";
}

function abrirCarrito() {
  document.getElementById("carrito").classList.add("abierto");
  document.getElementById("overlay").style.display = "block";
}

function cerrarTodo() {
  document.getElementById("menuLateral").classList.remove("abierto");
  document.getElementById("carrito").classList.remove("abierto");
  document.getElementById("overlay").style.display = "none";
}

// Animación de aparición de productos
function checkVisible() {
  document.querySelectorAll('.producto').forEach(p => {
    let rect = p.getBoundingClientRect();
    if(rect.top < window.innerHeight * 0.9) p.classList.add('visible');
  });
}
window.addEventListener('scroll', checkVisible);
checkVisible();

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0;
  let contador = 0;
  itemsDiv.innerHTML = "";
  carrito.forEach((prod, i) => {
    total += prod.precio * prod.cantidad;
    contador += prod.cantidad;
    itemsDiv.innerHTML += `
      <div style="border-bottom:1px solid #eee; padding:15px 0;">
        <strong>${prod.nombre}</strong><br>
        $${prod.precio} x ${prod.cantidad}
        <div style="margin-top:10px;">
          <button onclick="sumar(${i})" style="padding:5px 12px;">+</button>
          <button onclick="restar(${i})" style="padding:5px 12px;">-</button>
          <button onclick="eliminar(${i})" style="color:red; background:none; border:none; margin-left:10px;">Eliminar</button>
        </div>
      </div>`;
  });
  document.getElementById("total").innerHTML = "Total: $" + total;
  document.getElementById("contador").innerHTML = contador;
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  fly.style.width = rect.width + "px"; fly.style.left = rect.left + "px"; fly.style.top = rect.top + "px";
  fly.classList.add("flyImg"); document.body.appendChild(fly);
  let cartRect = document.getElementById("carritoIcono").getBoundingClientRect();
  setTimeout(() => { fly.style.left = cartRect.left + "px"; fly.style.top = cartRect.top + "px"; fly.style.width = "20px"; fly.style.opacity = "0"; }, 50);
  setTimeout(() => fly.remove(), 800);

  let item = carrito.find(p => p.nombre === nombre);
  if(item) item.cantidad++;
  else carrito.push({nombre, precio, cantidad: 1});
  actualizar();
}

function sumar(i){ carrito[i].cantidad++; actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad <= 0) carrito.splice(i,1); actualizar(); }
function eliminar(i){ carrito.splice(i,1); actualizar(); }
function vaciar(){ carrito = []; actualizar(); }

actualizar();
</script>
</body>
</html>
