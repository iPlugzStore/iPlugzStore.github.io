<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* BASE Y CORRECCIÓN DE DESBORDE */
* { box-sizing: border-box; } /* Crucial para que nada se salga de la pantalla */

html, body { 
  margin:0; padding:0; 
  font-family:'Helvetica Neue', sans-serif; 
  background:#f5f6fa; color:#111; 
  overflow-x:hidden; /* Evita el scroll horizontal */
  scroll-behavior:smooth; 
}

.contenedor { max-width:1100px; margin:0 auto; padding:0 16px; }
a { text-decoration:none; color:inherit; }

/* HEADER FIJO CORREGIDO */
header {
  position: fixed; top:0; left:0; width:100%;
  background: #111; padding:16px 0; /* Quitamos padding lateral aquí */
  color:white; z-index:1000; box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Contenedor interno para alinear logo y carrito sin pegarse a los bordes */
.header-content {
  display:flex; 
  justify-content:space-between; 
  align-items:center;
  padding: 0 20px;
}

.logo {
  font-size:28px; font-weight:900; text-transform:uppercase;
  background: linear-gradient(90deg,#4A90E2,#50E3C2);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

/* Espaciado extra a la derecha para que el contador no se corte */
#carritoIcono { 
  font-size:26px; 
  position:relative; 
  cursor:pointer; 
  margin-right: 10px; 
}

#contador { 
  position:absolute; top:-6px; right:-12px; 
  background:#50E3C2; color:white; 
  padding:2px 6px; border-radius:50%; 
  font-size:11px; font-weight:bold; 
  transition: transform 0.3s ease; 
}

/* ESPACIO HEADER */
body > .contenido { padding-top:80px; }

/* HERO CORREGIDO */
.hero {
  text-align:center; padding:100px 20px; 
  border-radius:0 0 50px 50px; /* Bordes más limpios para móvil */
  margin-bottom:40px; color:white;
  background: linear-gradient(135deg,#4A90E2,#50E3C2);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.hero h1 { font-size:32px; margin-bottom:12px; }

/* PRODUCTOS */
.productos {
  display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding-bottom:100px;
}
.producto {
  background:#fff; border-radius:24px; box-shadow:0 8px 20px rgba(0,0,0,0.07);
  overflow:hidden; width:100%; max-width:280px; text-align:center; 
  transition: transform 0.3s, opacity 0.6s;
  opacity:0; transform: translateY(20px);
}
.producto.visible { opacity:1; transform: translateY(0); }
.producto img { width:100%; display:block; }
.producto h3 { margin:12px 0 6px; font-size:18px; }

/* BOTONES */
.btn-agregar {
  width:90%; padding:12px; margin:10px auto 15px; border:none; border-radius:24px;
  font-size:16px; font-weight:bold; background:#50E3C2; color:#fff; display:block;
}

/* CARRITO LATERAL */
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:1999; }
#carrito {
  position:fixed; top:0; right:0; width:85%; max-width:320px; height:100%;
  background:white; box-shadow:-5px 0 25px rgba(0,0,0,0.3); padding:20px;
  transform: translateX(100%); transition: transform 0.3s ease; overflow-y:auto; z-index:2000;
}
#carrito.abierto { transform: translateX(0); }

/* BOTON FLOTANTE CENTRADO */
#btnFlotante {
  position:fixed; 
  bottom:20px; 
  left: 50%; /* Centrado horizontal */
  transform: translateX(-50%); /* Ajuste perfecto al centro */
  background:#4A90E2; color:#fff; border:none;
  padding:15px 30px; border-radius:50px; 
  font-size:18px; font-weight:bold;
  cursor:pointer; box-shadow:0 8px 25px rgba(0,0,0,0.3); 
  z-index:1001;
  white-space: nowrap;
  width: auto;
  min-width: 200px;
}

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:40px 20px 120px; }

/* FLY TO CART */
.flyImg { position:fixed; border-radius:50%; z-index:9999; pointer-events:none; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
</style>
</head>
<body>

<header>
  <div class="header-content contenedor">
    <div class="logo">iPlugz</div>
    <div id="carritoIcono">🛒<span id="contador">0</span></div>
  </div>
</header>

<div class="contenido contenedor">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <h2 style="text-align:center; margin-bottom:25px;">Destacados</h2>
  <div class="productos">
    <div class="producto"><img src="airpods-pro2.JPG" alt="Airpods Pro 2"><h3>Airpods Pro 2</h3><p>$35.000</p><button class="btn-agregar" onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button></div>
    <div class="producto"><img src="airpods-maxx.JPG" alt="Airpods Maxx"><h3>Airpods Maxx</h3><p>$45.000</p><button class="btn-agregar" onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button></div>
    <div class="producto"><img src="cable-usb-c.JPG" alt="Cable USB C"><h3>Cable USB C</h3><p>$18.000</p><button class="btn-agregar" onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button></div>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Ver Carrito</button>

<div id="overlay" onclick="cerrarCarrito()"></div>

<div id="carrito">
  <h3 style="border-bottom: 2px solid #f5f6fa; padding-bottom: 10px;">Tu Carrito</h3>
  <div id="items"></div>
  <h4 id="total" style="font-size: 20px; margin: 20px 0;">Total: $0</h4>
  <button class="btn-agregar" onclick="cerrarCarrito()" style="background:#666;">Cerrar</button>
  <button class="btn-agregar" onclick="vaciar()" style="background:#ff4757;">Vaciar Carrito</button>
</div>

<footer>
  &copy; 2026 iPlugz • <br><br>
  <a href="#">Facebook</a> • <a href="#">Instagram</a> • <a href="#">Twitter</a>
</footer>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];
var productos = document.querySelectorAll('.producto');

document.getElementById("carritoIcono").onclick = abrirCarrito;

function checkVisible() {
  productos.forEach(p => {
    let rect = p.getBoundingClientRect();
    if(rect.top < window.innerHeight * 0.9) p.classList.add('visible');
  });
}
window.addEventListener('scroll', checkVisible);
checkVisible();

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0;
  let contador = 0;
  itemsDiv.innerHTML = "";
  carrito.forEach((prod, i) => {
    total += prod.precio * prod.cantidad;
    contador += prod.cantidad;
    itemsDiv.innerHTML += `
      <div style="border-bottom:1px solid #eee; padding:15px 0;">
        <strong>${prod.nombre}</strong><br>
        $${prod.precio} x ${prod.cantidad}
        <div style="margin-top:10px;">
          <button onclick="sumar(${i})" style="padding:5px 12px; border-radius:5px; border:1px solid #ddd;">+</button>
          <button onclick="restar(${i})" style="padding:5px 12px; border-radius:5px; border:1px solid #ddd;">-</button>
          <button onclick="eliminar(${i})" style="color:red; background:none; border:none; margin-left:10px;">Eliminar</button>
        </div>
      </div>`;
  });
  document.getElementById("total").innerHTML = "Total: $" + total;
  document.getElementById("contador").innerHTML = contador;
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  
  fly.style.width = rect.width + "px";
  fly.style.left = rect.left + "px";
  fly.style.top = rect.top + "px";
  fly.classList.add("flyImg");
  document.body.appendChild(fly);

  let cartIcon = document.getElementById("carritoIcono");
  let cartRect = cartIcon.getBoundingClientRect();

  setTimeout(() => {
    fly.style.left = cartRect.left + "px";
    fly.style.top = cartRect.top + "px";
    fly.style.width = "20px";
    fly.style.opacity = "0";
  }, 50);

  setTimeout(() => fly.remove(), 800);

  let item = carrito.find(p => p.nombre === nombre);
  if(item) item.cantidad++;
  else carrito.push({nombre, precio, cantidad: 1});
  actualizar();
}

function sumar(i){ carrito[i].cantidad++; actualizar(); }
function restar(i){ 
  carrito[i].cantidad--; 
  if(carrito[i].cantidad <= 0) carrito.splice(i,1); 
  actualizar(); 
}
function eliminar(i){ carrito.splice(i,1); actualizar(); }
function vaciar(){ carrito = []; actualizar(); }
function abrirCarrito(){ 
  document.getElementById("carrito").classList.add("abierto"); 
  document.getElementById("overlay").style.display = "block"; 
}
function cerrarCarrito(){ 
  document.getElementById("carrito").classList.remove("abierto"); 
  document.getElementById("overlay").style.display = "none"; 
}

actualizar();
</script>
</body>
</html>
