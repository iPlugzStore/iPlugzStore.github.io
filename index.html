<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; font-family: 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif; background:#f5f5f7; color:#111; overflow-x:hidden; }

/* CONTAINER GENERAL */
.contenedor { max-width:1200px; margin:0 auto; padding:0 15px; }

/* HEADER FIJO */
header{
  position: fixed;
  top:0; left:0; width:100%;
  background: #111;
  padding:15px 20px;
  display:flex; justify-content:space-between; align-items:center;
  color:white; z-index:1000;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.logo{
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
  background: linear-gradient(90deg,#ff6a00,#ee0979);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}
#carritoIcono{ cursor:pointer; position:relative; font-size:26px; }
#contador{ position:absolute; top:-8px; right:-10px; background:#e53935; color:white; border-radius:50%; padding:4px 7px; font-size:12px; font-weight:bold; transition: transform 0.3s ease; }

/* ESPACIO PARA HEADER */
body > .contenido{ padding-top:90px; }

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color:white;
  border-radius:0 0 50% 50% / 0 0 5% 5%;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
.hero h1{ font-size:32px; margin-bottom:10px; }
.hero p{ font-size:18px; font-weight:500; }

/* PRODUCTOS */
.productos{
  display:flex; flex-wrap:wrap; justify-content:center; gap:25px;
  padding:40px 0;
}
.producto{
  width:100%; max-width:250px; text-align:center;
  background:white; border-radius:25px; padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}
.producto:hover{
  transform: translateY(-5px);
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}
.producto img{ width:100%; border-radius:20px; transition: transform 0.3s; cursor:pointer; }
.producto img:hover{ transform: scale(1.05); }
.producto h3{ margin:10px 0 5px; font-weight:600; color:#111; }
.producto p{ color:#666; font-weight:500; }

/* BOTONES */
button{
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color:white; border:none; padding:12px; width:100%;
  border-radius:25px; margin-top:10px; cursor:pointer; font-size:16px; font-weight:bold;
  transition: transform 0.2s, box-shadow 0.2s;
}
button:hover{ transform: scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.2); }

/* CARRITO */
#overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:none; z-index:999; }
#carrito{
  position:fixed; top:0; right:0; width:90%; max-width:350px; height:100%;
  background:white; box-shadow:-5px 0 25px rgba(0,0,0,0.3);
  padding:20px; transform: translateX(100%);
  transition: transform 0.3s ease; overflow-y:auto; z-index:1000;
}
#carrito.abierto{ transform: translateX(0); }
.item{ border-bottom:1px solid #eee; padding:10px 0; font-weight:500; }
.item button{ width:30px; height:30px; font-size:16px; margin-right:5px; }
.eliminar{ background:#e53935; width:100%; margin-top:5px; }

/* ANIMACIÓN FLY */
.flyImg{ position:absolute; width:100px; height:100px; border-radius:20px; z-index:10000; pointer-events:none; transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out; }
</style>
</head>

<body>
<header class="contenedor">
  <div class="logo">iPlugz</div>
  <div id="carritoIcono">🛒<span id="contador">0</span></div>
</header>

<div class="contenido contenedor">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <div class="productos">
    <div class="producto">
      <a href="airpods-pro2.html"><img src="airpods-pro2.JPG" alt="Airpods Pro 2"></a>
      <h3>Airpods Pro 2</h3>
      <p>$35.000</p>
      <button onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button>
    </div>
    <div class="producto">
      <a href="airpods-maxx.html"><img src="airpods-maxx.JPG" alt="Airpods Maxx"></a>
      <h3>Airpods Maxx</h3>
      <p>$45.000</p>
      <button onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button>
    </div>
    <div class="producto">
      <a href="cable-usb-c.html"><img src="cable-usb-c.JPG" alt="Cable USB C"></a>
      <h3>Cable USB C + Cabezal</h3>
      <p>$18.000</p>
      <button onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button>
    </div>
  </div>
</div>

<div id="overlay" onclick="cerrarCarrito()"></div>

<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="cerrarCarrito()">Cerrar</button>
  <button onclick="vaciar()">Vaciar</button>
</div>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];
document.getElementById("carritoIcono").onclick = abrirCarrito;

function guardar(){ localStorage.setItem("carrito", JSON.stringify(carrito)); }

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0;
  let contador = 0;
  itemsDiv.innerHTML = "";
  for(let i=0;i<carrito.length;i++){
    total += carrito[i].precio*carrito[i].cantidad;
    contador += carrito[i].cantidad;
    itemsDiv.innerHTML += "<div class='item'>"+
      carrito[i].nombre+"<br>$"+
      carrito[i].precio+" x "+
      carrito[i].cantidad+
      "<br><button onclick='sumar("+i+")'>+</button>"+
      "<button onclick='restar("+i+")'>-</button>"+
      "<button class='eliminar' onclick='eliminar("+i+")'>Eliminar</button></div>";
  }
  document.getElementById("total").innerHTML = "Total: $" + total;
  let counter = document.getElementById("contador");
  counter.innerHTML = contador;
  counter.style.transform = "scale(1.5)";
  setTimeout(()=>{ counter.style.transform = "scale(1)"; },300);
}

function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  fly.style.position = "fixed";
  fly.style.left = rect.left + "px";
  fly.style.top = rect.top + "px";
  fly.style.width = rect.width + "px";
  fly.style.height = rect.height + "px";
  fly.classList.add("flyImg");
  document.body.appendChild(fly);
  let cartIcon = document.getElementById("carritoIcono");
  let cartRect = cartIcon.getBoundingClientRect();
  setTimeout(()=>{
    fly.style.left = cartRect.left + "px";
    fly.style.top = cartRect.top + "px";
    fly.style.width = "20px";
    fly.style.height = "20px";
    fly.style.opacity = 0;
  },10);
  setTimeout(()=>{ document.body.removeChild(fly); },800);

  let encontrado=false;
  for(let i=0;i<carrito.length;i++){
    if(carrito[i].nombre===nombre){
      carrito[i].cantidad++;
      encontrado=true;
    }
  }
  if(!encontrado){
    carrito.push({nombre:nombre,precio:precio,cantidad:1});
  }
  guardar();
  actualizar();
}

function sumar(i){ carrito[i].cantidad++; guardar(); actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad<=0){ carrito.splice(i,1); } guardar(); actualizar(); }
function eliminar(i){ carrito.splice(i,1); guardar(); actualizar(); }
function vaciar(){ carrito=[]; guardar(); actualizar(); }

function abrirCarrito(){ document.getElementById("carrito").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function cerrarCarrito(){ document.getElementById("carrito").classList.remove("abierto"); document.getElementById("overlay").style.display="none"; }

actualizar();
</script>
</body>
</html>
