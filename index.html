<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPlugz - Checkout Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --blue: #4A90E2;
            --teal: #50E3C2;
            --gradient: linear-gradient(135deg, var(--blue), var(--teal));
            --bg: #f8f9fd;
            --card: #ffffff;
            --text: #111111;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --header-blur: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --header-blur: rgba(15, 15, 15, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; padding: 0;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.3s, color 0.3s;
        }

        .contenedor { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--header-blur); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        .nav-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 70px; }
        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text); position: relative; }
        #contador { position: absolute; top: -5px; right: -8px; background: var(--blue); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        /* HERO */
        .hero { position: relative; height: 350px; display: flex; align-items: center; justify-content: center; text-align: center; color: white; background: var(--gradient); overflow: hidden; border-radius: 0 0 50px 50px; margin-bottom: 40px; }
        #particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hero-text { position: relative; z-index: 2; }

        /* PRODUCTOS */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 25px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; }
        .precio { color: var(--blue); font-weight: bold; font-size: 22px; margin: 10px 0; }

        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--gradient); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* SKELETON */
        .skeleton { background: #eee; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: load 1.5s infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* SIDEBARS */
        .sidebar { position: fixed; top: 0; right: 0; width: 350px; height: 100%; background: var(--card); z-index: 2000; padding: 25px; transform: translateX(100%); transition: 0.4s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; display: none; backdrop-filter: blur(4px); }

        /* FORMULARIO */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; opacity: 0.8; }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); background: var(--bg); color: var(--text); }

        footer { background: #000; color: white; text-align: center; padding: 40px; }

        @media (max-width: 600px) { .sidebar { width: 100%; } }
    </style>
</head>
<body>

    <header>
        <div class="contenedor nav-grid">
            <button class="icon-btn" onclick="toggleSidebar('menuLateral')">☰</button>
            <div class="logo">iPlugz</div>
            <button class="icon-btn" onclick="toggleSidebar('cartSidebar')">🛒 <span id="contador">0</span></button>
        </div>
    </header>

    <div id="menuLateral" class="sidebar" style="left:0; right:auto; transform:translateX(-100%)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Menú</h3>
            <button onclick="closeAll()" style="background:none; border:none; font-size:24px; color:var(--text);">✕</button>
        </div>
        <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
            <span>Modo Oscuro</span>
            <input type="checkbox" id="darkCheck" onchange="toggleDarkMode()">
        </div>
        <nav style="margin-top:30px; display:flex; flex-direction:column; gap:20px;">
            <a href="#" style="text-decoration:none; color:var(--text);">Inicio</a>
            <a href="#" style="text-decoration:none; color:var(--text);">Productos</a>
        </nav>
    </div>

    <div id="cartSidebar" class="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Tu Bolsa</h3>
            <button onclick="closeAll()" style="background:none; border:none; font-size:24px; color:var(--text);">✕</button>
        </div>
        <div id="cartContent" style="flex-grow:1; overflow-y:auto; margin-top:20px;"></div>
        <div id="totalArea" style="padding-top:20px; border-top:1px solid #eee;">
            <h3 id="cartTotal">Total: $0</h3>
            <button class="btn-primary" onclick="showCheckout()">Continuar al Pago</button>
        </div>
    </div>

    <div id="checkoutSidebar" class="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Tus Datos</h3>
            <button onclick="toggleSidebar('cartSidebar')" style="background:none; border:none; color:var(--blue); font-weight:bold;">Volver</button>
        </div>
        <div style="margin-top:20px;">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="form-nombre" placeholder="Juan Perez">
            </div>
            <div class="form-group">
                <label>Dirección de Entrega</label>
                <input type="text" id="form-direccion" placeholder="Calle Falsa 123, CABA">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="form-tel" placeholder="11 1234 5678">
            </div>
            <div class="form-group">
                <label>Email (Opcional)</label>
                <input type="email" id="form-email" placeholder="juan@email.com">
            </div>
            <p style="font-size:12px; opacity:0.6; margin-top:20px;">Al confirmar, se abrirá WhatsApp para coordinar el pago y envío.</p>
            <button class="btn-primary" onclick="enviarPedidoFinal()">Confirmar y Pedir</button>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <section class="hero">
        <canvas id="particles-canvas"></canvas>
        <div class="hero-text">
            <h1>Accesorios Premium</h1>
            <p>Calidad • Precio • Confianza</p>
        </div>
    </section>

    <main class="contenedor">
        <div class="grid-productos" id="listaProductos">
            <div class="card skeleton" style="height:350px"></div>
            <div class="card skeleton" style="height:350px"></div>
            <div class="card skeleton" style="height:350px"></div>
        </div>
    </main>

    <footer>
        <div class="logo">iPlugz</div>
        <p>&copy; 2026 iPlugz Argentina</p>
    </footer>

    <script>
        const PRODUCTOS = [
            { id: 1, nombre: "Airpods Pro 2", precio: 35000, img: "airpods-pro2.JPG" },
            { id: 2, nombre: "Airpods Maxx", precio: 45000, img: "airpods-maxx.JPG" },
            { id: 3, nombre: "Cable USB C + Cabezal", precio: 18000, img: "cable-usb-c.JPG" }
        ];

        let carrito = JSON.parse(localStorage.getItem('cart_ip')) || [];
        
        window.onload = () => {
            if(localStorage.getItem('dark_ip') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkCheck').checked = true;
            }
            setTimeout(() => {
                render();
                initParticles();
            }, 1000);
            updateUI();
        };

        function render() {
            document.getElementById('listaProductos').innerHTML = PRODUCTOS.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <div class="card-body">
                        <h3>${p.nombre}</h3>
                        <p class="precio">$${p.precio.toLocaleString()}</p>
                        <button class="btn-primary" onclick="add(${p.id})">Añadir al Carrito</button>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            const p = PRODUCTOS.find(x => x.id === id);
            const exists = carrito.find(x => x.id === id);
            if(exists) exists.qty++;
            else carrito.push({...p, qty: 1});
            save();
            toggleSidebar('cartSidebar');
        }

        function updateUI() {
            const container = document.getElementById('cartContent');
            let total = 0;
            let count = 0;
            container.innerHTML = carrito.map((item, i) => {
                total += item.precio * item.qty;
                count += item.qty;
                return `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <div><b>${item.nombre}</b><br>$${item.precio.toLocaleString()}</div>
                    <div>
                        <button onclick="change(${i}, -1)">-</button> ${item.qty} <button onclick="change(${i}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `Total: $${total.toLocaleString()}`;
            document.getElementById('contador').innerText = count;
        }

        function change(i, d) {
            carrito[i].qty += d;
            if(carrito[i].qty <= 0) carrito.splice(i,1);
            save();
        }

        function save() {
            localStorage.setItem('cart_ip', JSON.stringify(carrito));
            updateUI();
        }

        function toggleSidebar(id) {
            closeAll();
            document.getElementById(id).classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function showCheckout() {
            if(carrito.length === 0) return alert("Bolsa vacía");
            toggleSidebar('checkoutSidebar');
        }

        function closeAll() {
            document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById('overlay').style.display = 'none';
        }

        function toggleDarkMode() {
            const dark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_ip', dark);
        }

        function enviarPedidoFinal() {
            const nom = document.getElementById('form-nombre').value;
            const dir = document.getElementById('form-direccion').value;
            const tel = document.getElementById('form-tel').value;
            const email = document.getElementById('form-email').value || "No especificado";

            if(!nom || !dir || !tel) return alert("Por favor completa los campos obligatorios.");

            let msg = `*NUEVO PEDIDO - iPlugz* 🚀\n\n`;
            msg += `👤 *Cliente:* ${nom}\n`;
            msg += `📍 *Dirección:* ${dir}\n`;
            msg += `📞 *Tel:* ${tel}\n`;
            msg += `✉️ *Email:* ${email}\n\n`;
            msg += `📦 *Detalle del Pedido:*\n`;
            
            let total = 0;
            carrito.forEach(x => {
                msg += `- ${x.nombre} (x${x.qty}): $${(x.precio*x.qty).toLocaleString()}\n`;
                total += x.precio*x.qty;
            });

            msg += `\n💰 *TOTAL A PAGAR: $${total.toLocaleString()}*`;
            
            const num = "5491127081095";
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function initParticles() {
            const c = document.getElementById('particles-canvas');
            const ctx = c.getContext('2d');
            let w = c.width = window.innerWidth, h = c.height = 350;
            let parts = Array.from({length: 50}, () => ({x: Math.random()*w, y: Math.random()*h, vX: Math.random()-0.5, vY: Math.random()-0.5}));
            function loop() {
                ctx.clearRect(0,0,w,h); ctx.fillStyle = "rgba(255,255,255,0.4)";
                parts.forEach(p => {
                    p.x += p.vX; p.y += p.vY;
                    if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
