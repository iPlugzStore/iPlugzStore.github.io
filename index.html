<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iplugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin:0;
  padding:0;
  overflow-x:hidden;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fff;
  color:#111;
}

/* HEADER FIJO */
header{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  background:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
  z-index:1000;
  box-sizing:border-box;
}

.logo{
  font-size:22px;
  font-weight:600;
  letter-spacing:1px;
}

#carritoIcono{
  cursor:pointer;
  position:relative;
  font-size:24px;
}

#contador{
  position:absolute;
  top:-8px;
  right:-10px;
  background:#111;
  color:white;
  border-radius:50%;
  padding:3px 6px;
  font-size:12px;
  transition: transform 0.3s ease;
}

/* HACK: ESPACIO PARA HEADER */
body > .contenido{
  padding-top:80px; /* igual al header */
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:24px;
  font-weight:500;
}

.hero p{
  color:#666;
  margin-top:10px;
}

/* PRODUCTOS */
.productos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
  box-sizing:border-box;
}

.producto{
  width:100%;
  max-width:260px;
  text-align:center;
  box-sizing:border-box;
  position:relative;
}

.producto img{
  width:100%;
  border-radius:20px;
  transition:0.3s;
}

.producto img:hover{
  transform:scale(1.05);
}

.producto h3{
  margin:15px 0 5px;
  font-weight:500;
}

.producto p{
  color:#666;
}

button{
  background:#111;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
}

button:hover{
  background:#333;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:999;
}

/* CARRITO */
#carrito{
  position:fixed;
  top:0;
  right:0;
  width:80%;
  max-width:320px;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.1);
  padding:20px;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  overflow-y:auto;
  z-index:1000;
}

#carrito.abierto{
  transform: translateX(0);
}

.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.item button{
  width:30px;
  height:30px;
  font-size:16px;
  margin-right:5px;
}

.eliminar{
  background:#e53935;
  width:100%;
  margin-top:5px;
}

/* ANIMACIÓN FLY */
.flyImg{
  position:absolute;
  width:100px;
  height:100px;
  border-radius:20px;
  z-index:10000;
  pointer-events:none;
  transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out;
}
</style>
</head>
<body>

<header>
  <div class="logo">iplugz</div>
  <div id="carritoIcono" onclick="abrirCarrito()">
    🛒
    <span id="contador">0</span>
  </div>
</header>

<div class="contenido">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <div class="productos">

    <div class="producto">
      <img src="https://via.placeholder.com/300x300.png?text=Airpods+Pro+2" alt="Airpods Pro 2">
      <h3>Airpods Pro 2</h3>
      <p>$35.000</p>
      <button onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="https://via.placeholder.com/300x300.png?text=Airpods+Maxx" alt="Airpods Maxx">
      <h3>Airpods Maxx</h3>
      <p>$45.000</p>
      <button onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="https://via.placeholder.com/300x300.png?text=Cable+USB+C" alt="Cable USB C">
      <h3>Cable USB C + Cabezal</h3>
      <p>$18.000</p>
      <button onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button>
    </div>

  </div>
</div>

<div id="overlay" onclick="cerrarCarrito()"></div>

<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="cerrarCarrito()">Cerrar</button>
  <button onclick="vaciar()">Vaciar</button>
</div>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){ localStorage.setItem("carrito", JSON.stringify(carrito)); }

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0;
  let contador = 0;
  itemsDiv.innerHTML = "";
  for(let i=0;i<carrito.length;i++){
    total += carrito[i].precio*carrito[i].cantidad;
    contador += carrito[i].cantidad;
    itemsDiv.innerHTML += "<div class='item'>"+
      carrito[i].nombre+"<br>$"+
      carrito[i].precio+" x "+
      carrito[i].cantidad+
      "<br><button onclick='sumar("+i+")'>+</button>"+
      "<button onclick='restar("+i+")'>-</button>"+
      "<button class='eliminar' onclick='eliminar("+i+")'>Eliminar</button></div>";
  }
  document.getElementById("total").innerHTML = "Total: $" + total;
  let counter = document.getElementById("contador");
  counter.innerHTML = contador;
  counter.style.transform = "scale(1.5)";
  setTimeout(()=>{ counter.style.transform = "scale(1)"; },300);
}

function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  fly.style.position = "fixed";
  fly.style.left = rect.left + "px";
  fly.style.top = rect.top + "px";
  fly.style.width = rect.width + "px";
  fly.style.height = rect.height + "px";
  fly.style.transition = "all 0.8s ease-in-out";
  fly.classList.add("flyImg");
  document.body.appendChild(fly);
  let cartIcon = document.getElementById("carritoIcono");
  let cartRect = cartIcon.getBoundingClientRect();
  setTimeout(()=>{
    fly.style.left = cartRect.left + "px";
    fly.style.top = cartRect.top + "px";
    fly.style.width = "20px";
    fly.style.height = "20px";
    fly.style.opacity = 0;
  },10);
  setTimeout(()=>{ document.body.removeChild(fly); },800);

  let encontrado=false;
  for(let i=0;i<carrito.length;i++){
    if(carrito[i].nombre===nombre){
      carrito[i].cantidad++;
      encontrado=true;
    }
  }
  if(!encontrado){
    carrito.push({nombre:nombre,precio:precio,cantidad:1});
  }
  guardar();
  actualizar();
}

function sumar(i){ carrito[i].cantidad++; guardar(); actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad<=0){ carrito.splice(i,1); } guardar(); actualizar(); }
function eliminar(i){ carrito.splice(i,1); guardar(); actualizar(); }
function vaciar(){ carrito=[]; guardar(); actualizar(); }

function abrirCarrito(){
  document.getElementById("carrito").classList.add("abierto");
  document.getElementById("overlay").style.display="block";
}
function cerrarCarrito(){
  document.getElementById("carrito").classList.remove("abierto");
  document.getElementById("overlay").style.display="none";
}

actualizar();
</script>
</body>
</html>
