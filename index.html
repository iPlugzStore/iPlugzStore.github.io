<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Experience Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* VARIABLES CON SOPORTE PARA MODO OSCURO */
:root {
  --blue: #4A90E2;
  --teal: #50E3C2;
  --gradient: linear-gradient(90deg, var(--blue), var(--teal));
  --bg: #f5f6fa;
  --text: #111;
  --card: #ffffff;
  --header-bg: rgba(74, 144, 226, 0.9);
}

body.dark-mode {
  --bg: #121212;
  --text: #ffffff;
  --card: #1e1e1e;
  --header-bg: rgba(20, 20, 20, 0.95);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
  margin:0; padding:0; 
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  background: var(--bg); color: var(--text); 
  overflow-x:hidden; scroll-behavior:smooth;
  transition: background 0.3s ease, color 0.3s ease;
}

.contenedor { max-width:1100px; margin:0 auto; padding:0 20px; }

/* HEADER CON BUSCADOR */
header {
  position: fixed; top:0; left:0; width:100%;
  background: var(--header-bg);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 12px 0; color: white; z-index: 1000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.header-content {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.header-left { display: flex; align-items: center; gap: 15px; }
#menuIcono { font-size: 26px; cursor: pointer; }
#searchBtn { font-size: 20px; cursor: pointer; }

.logo { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

#carritoIcono { font-size:24px; cursor:pointer; justify-self: end; position:relative; }
#contador { position:absolute; top:-5px; right:-10px; background: white; color: var(--blue); padding:2px 6px; border-radius:50%; font-size:10px; font-weight:bold; }

/* BARRA DE BUSQUEDA OCULTA */
#searchBar {
  position: absolute; top: 100%; left: 0; width: 100%; background: var(--card);
  padding: 15px; display: none; box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}
#searchBar input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; }

/* HERO CON PARTÍCULAS */
.hero {
  position: relative; text-align:center; padding:110px 20px 80px; 
  border-radius: 0 0 50px 50px; color:white; margin-bottom:40px;
  background: var(--gradient); overflow: hidden;
}
#particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.hero-content { position: relative; z-index: 2; }
.hero h1 { font-size: 38px; margin-bottom: 12px; }

/* SKELETON LOADING ANIMATION */
.skeleton {
  background: #eee;
  background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
  background-size: 200% 100%;
  animation: 1.5s shine linear infinite;
}
body.dark-mode .skeleton {
  background: #2a2a2a;
  background: linear-gradient(110deg, #2a2a2a 8%, #333 18%, #2a2a2a 33%);
  background-size: 200% 100%;
}
@keyframes shine { to { background-position-x: -200%; } }

/* PRODUCTOS */
.productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding-bottom: 100px; }
.producto {
  background: var(--card); border-radius: 24px; overflow: hidden; 
  text-align: center; width: 100%; max-width: 280px;
  box-shadow: var(--shadow); transition: 0.3s;
}
.producto img { width: 100%; display: block; }
.producto.loading img, .producto.loading h3, .producto.loading p { visibility: hidden; }

/* MENU LATERAL */
#menuLateral {
  position:fixed; top:0; left:0; width:280px; height:100%;
  background: var(--card); z-index: 2001;
  transform: translateX(-100%); transition: 0.3s ease; padding: 30px;
}
#menuLateral.abierto { transform: translateX(0); }
#menuLateral a { display: block; padding: 15px 0; font-size: 18px; font-weight: bold; border-bottom: 1px solid #eee; }

/* SWITCH MODO OSCURO */
.dark-mode-toggle { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; font-weight: bold; }
.switch { position: relative; display: inline-block; width: 50px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--blue); }
input:checked + .slider:before { transform: translateX(26px); }

#btnFlotante {
  position:fixed; bottom:25px; left: 50%; transform: translateX(-50%);
  background: var(--blue); color:#fff; border:none; padding:16px 35px; border-radius:50px; 
  font-size:17px; font-weight:bold; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index:900;
}
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:1999; }
</style>
</head>
<body class="loading">

<header>
  <div class="header-content contenedor">
    <div class="header-left">
      <div id="menuIcono" onclick="toggleMenu()">☰</div>
      <div id="searchBtn" onclick="toggleSearch()">🔍</div>
    </div>
    <div class="logo">iPlugz</div>
    <div id="carritoIcono" onclick="abrirCarrito()">🛒<span id="contador">0</span></div>
  </div>
  <div id="searchBar">
    <input type="text" id="searchInput" placeholder="Buscar producto..." onkeyup="buscar()">
  </div>
</header>

<div id="menuLateral">
  <div style="text-align:right; font-size:30px; cursor:pointer" onclick="toggleMenu()">&times;</div>
  <a href="#">Inicio</a>
  <a href="#">Productos</a>
  <div class="dark-mode-toggle">
    <span>Modo Oscuro</span>
    <label class="switch">
      <input type="checkbox" id="darkModeCheck" onclick="toggleDarkMode()">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="hero">
  <canvas id="particles-canvas"></canvas>
  <div class="hero-content">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>
</div>

<div class="contenido contenedor">
  <div class="productos" id="listaProductos">
    <div class="producto loading skeleton" style="height: 350px;"></div>
    <div class="producto loading skeleton" style="height: 350px;"></div>
    <div class="producto loading skeleton" style="height: 350px;"></div>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Carrito</button>
<div id="overlay" onclick="cerrarTodo()"></div>

<div id="carrito" style="position:fixed; top:0; right:0; width:85%; max-width:320px; height:100%; background:var(--card); z-index:2000; padding:20px; transform:translateX(100%); transition:0.3s;">
  <h3>Tu Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="cerrarTodo()" style="width:100%; padding:10px; margin-top:10px;">Cerrar</button>
</div>

<script>
// DATOS DE PRODUCTOS
const db = [
  { nombre: "Airpods Pro 2", precio: 35000, img: "airpods-pro2.JPG" },
  { nombre: "Airpods Maxx", precio: 45000, img: "airpods-maxx.JPG" },
  { nombre: "Cable USB C + Cabezal", precio: 18000, img: "cable-usb-c.JPG" }
];

var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

// 1. SKELETON LOADING SIMULADO
window.onload = () => {
  setTimeout(() => {
    renderProductos(db);
    initParticles();
  }, 1500); // 1.5 segundos de carga para mostrar el efecto
};

function renderProductos(data) {
  const container = document.getElementById("listaProductos");
  container.innerHTML = data.map(p => `
    <div class="producto visible">
      <img src="${p.img}" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <p>$${p.precio}</p>
      <button onclick="agregar('${p.nombre}', ${p.precio}, this)" style="width:90%; padding:10px; border-radius:20px; border:none; background:var(--teal); color:white; font-weight:bold; margin-bottom:15px; cursor:pointer;">Agregar al carrito</button>
    </div>
  `).join('');
}

// 2. BUSCADOR
function toggleSearch() {
  let sb = document.getElementById("searchBar");
  sb.style.display = sb.style.display === "block" ? "none" : "block";
}
function buscar() {
  let term = document.getElementById("searchInput").value.toLowerCase();
  let filtrados = db.filter(p => p.nombre.toLowerCase().includes(term));
  renderProductos(filtrados);
}

// 3. MODO OSCURO
function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");
  let isDark = document.body.classList.contains("dark-mode");
  localStorage.setItem("dark-mode", isDark);
}

// 4. FONDO DE PARTÍCULAS (Canvas)
function initParticles() {
  const canvas = document.getElementById("particles-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = 400;

  let particles = [];
  for(let i=0; i<50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3
    });
  }

  function animate() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

// FUNCIONES DE CARRITO (Iguales a las anteriores actualizadas)
function toggleMenu() { document.getElementById("menuLateral").classList.toggle("abierto"); }
function abrirCarrito() { document.getElementById("carrito").style.transform = "translateX(0)"; document.getElementById("overlay").style.display = "block"; }
function cerrarTodo() { 
  document.getElementById("menuLateral").classList.remove("abierto"); 
  document.getElementById("carrito").style.transform = "translateX(100%)"; 
  document.getElementById("overlay").style.display = "none"; 
}

function agregar(nombre, precio, btn){
  let item = carrito.find(p => p.nombre === nombre);
  if(item) item.cantidad++;
  else carrito.push({nombre, precio, cantidad: 1});
  actualizar();
}

function actualizar(){
  document.getElementById("contador").innerHTML = carrito.reduce((sum, p) => sum + p.cantidad, 0);
  document.getElementById("total").innerHTML = "Total: $" + carrito.reduce((sum, p) => sum + (p.precio*p.cantidad), 0);
  localStorage.setItem("carrito", JSON.stringify(carrito));
}
actualizar();
</script>
</body>
</html>
