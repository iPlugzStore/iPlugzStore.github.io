<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* VARIABLES DE COLOR BASADAS EN TU DISEÑO */
:root {
  --blue: #4A90E2;
  --teal: #50E3C2;
  --gradient: linear-gradient(90deg, var(--blue), var(--teal));
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
  margin:0; padding:0; 
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  background:#f5f6fa; color:#111; 
  overflow-x:hidden; scroll-behavior:smooth; 
}

.contenedor { max-width:1100px; margin:0 auto; padding:0 20px; }

/* HEADER PREMIUM - LOGO AL CENTRO Y RAYITAS */
header {
  position: fixed; top:0; left:0; width:100%;
  background: linear-gradient(90deg, rgba(74, 144, 226, 0.95), rgba(80, 227, 194, 0.95));
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 15px 0;
  color: white; z-index: 1000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.header-content {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

#menuIcono { font-size: 28px; cursor: pointer; justify-self: start; }

.logo {
  font-size: 26px; font-weight: 900; text-transform: uppercase;
  justify-self: center; letter-spacing: 1px;
}

#carritoIcono { font-size:24px; cursor:pointer; justify-self: end; position:relative; margin-right: 5px; }

#contador { 
  position:absolute; top:-6px; right:-12px; 
  background: white; color: var(--blue); 
  padding:2px 6px; border-radius:50%; 
  font-size:11px; font-weight:bold; 
}

/* HERO ORIGINAL CON ESTILO NUEVO */
.hero {
  text-align:center; padding:110px 20px 70px; 
  border-radius: 0 0 50px 50px;
  color:white; margin-bottom:40px;
  background: var(--gradient);
  background-size: 300% 300%;
  animation: gradientFlow 8s ease infinite;
}

@keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.hero h1 { font-size: 38px; margin-bottom: 12px; } /* Texto Original */
.hero p { font-size: 18px; opacity: 0.9; } /* Texto Original */

/* PRODUCTOS ORIGINALES */
.productos { 
  display: flex; flex-wrap: wrap; justify-content: center; 
  gap: 25px; padding-bottom: 120px; 
}

.producto {
  background: white; border-radius: 24px; 
  overflow: hidden; text-align: center; width: 100%; max-width: 280px;
  box-shadow: var(--shadow);
  transition: all 0.4s ease;
  opacity: 0; transform: translateY(20px);
}
.producto.visible { opacity: 1; transform: translateY(0); }
.producto:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(74, 144, 226, 0.2); }

.producto img { width: 100%; display: block; }
.producto h3 { margin: 15px 0 5px; font-size: 20px; }
.producto p { color: #666; font-size: 17px; margin-bottom: 15px; }

/* BOTONES ORIGINALES */
.btn-agregar {
  width: 90%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 24px;
  background: var(--teal); color: white;
  font-size: 16px; font-weight: bold; cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}
.btn-agregar:hover { background: #417D9C; transform: scale(1.03); }

/* MENU LATERAL ORIGINAL */
#menuLateral {
  position:fixed; top:0; left:0; width:280px; height:100%;
  background: white; z-index: 2001;
  transform: translateX(-100%); transition: 0.3s ease;
  padding: 30px;
}
#menuLateral.abierto { transform: translateX(0); }
#menuLateral ul { list-style:none; padding:0; margin-top:40px; }
#menuLateral li { margin-bottom:20px; font-size:18px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:10px; }

/* BOTON FLOTANTE CENTRADO */
#btnFlotante {
  position:fixed; bottom:25px; left: 50%; transform: translateX(-50%);
  background: var(--blue); color:#fff; border:none; 
  padding:16px 35px; border-radius:50px; 
  font-size:17px; font-weight:bold; box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
  z-index:900; cursor:pointer;
}

#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter: blur(3px); display:none; z-index:1999; }

/* CARRITO */
#carrito {
  position:fixed; top:0; right:0; width:85%; max-width:350px; height:100%;
  background:white; z-index:2000; padding:25px;
  transform: translateX(100%); transition: 0.3s ease; overflow-y:auto;
}
#carrito.abierto { transform: translateX(0); }

/* FOOTER ORIGINAL */
footer { background:#111; color:white; text-align:center; padding:50px 20px 120px; }
footer a { color: var(--teal); margin: 0 10px; }

/* ANIMACION FLY */
.flyImg { position:fixed; border-radius:20px; z-index:9999; pointer-events:none; transition: all 0.8s ease-in-out; }
</style>
</head>
<body>

<header>
  <div class="header-content contenedor">
    <div id="menuIcono" onclick="abrirMenu()">☰</div>
    <div class="logo">iPlugz</div>
    <div id="carritoIcono" onclick="abrirCarrito()">🛒<span id="contador">0</span></div>
  </div>
</header>

<div id="menuLateral">
  <div style="font-size:30px; cursor:pointer; text-align:right" onclick="cerrarTodo()">&times;</div>
  <ul>
    <li><a href="#">Inicio</a></li>
    <li><a href="#">Productos</a></li>
    <li><a href="#">Novedades</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>
</div>

<div class="contenido contenedor">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <h2 style="text-align:center; margin-bottom:30px;">Destacados</h2>
  
  <div class="productos">
    <div class="producto">
      <img src="airpods-pro2.JPG" alt="Airpods Pro 2">
      <h3>Airpods Pro 2</h3>
      <p>$35.000</p>
      <button class="btn-agregar" onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="airpods-maxx.JPG" alt="Airpods Maxx">
      <h3>Airpods Maxx</h3>
      <p>$45.000</p>
      <button class="btn-agregar" onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="cable-usb-c.JPG" alt="Cable USB C">
      <h3>Cable USB C + Cabezal</h3>
      <p>$18.000</p>
      <button class="btn-agregar" onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button>
    </div>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Carrito</button>

<div id="overlay" onclick="cerrarTodo()"></div>

<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total" style="font-size:20px; margin:20px 0;">Total: $0</h4>
  <button class="btn-agregar" onclick="cerrarTodo()" style="background:#666;">Cerrar</button>
  <button class="btn-agregar" onclick="vaciar()" style="background:#ff4757;">Vaciar</button>
</div>

<footer>
  &copy; 2026 iPlugz • <a href="#">Facebook</a> • <a href="#">Instagram</a> • <a href="#">Twitter</a>
</footer>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function abrirMenu() { document.getElementById("menuLateral").classList.add("abierto"); document.getElementById("overlay").style.display = "block"; }
function abrirCarrito() { document.getElementById("carrito").classList.add("abierto"); document.getElementById("overlay").style.display = "block"; }
function cerrarTodo() { 
  document.getElementById("menuLateral").classList.remove("abierto"); 
  document.getElementById("carrito").classList.remove("abierto"); 
  document.getElementById("overlay").style.display = "none"; 
}

// Animación de aparición
function checkVisible() {
  document.querySelectorAll('.producto').forEach(p => {
    let rect = p.getBoundingClientRect();
    if(rect.top < window.innerHeight * 0.9) p.classList.add('visible');
  });
}
window.addEventListener('scroll', checkVisible);
checkVisible();

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0; let contador = 0;
  itemsDiv.innerHTML = "";
  carrito.forEach((prod, i) => {
    total += prod.precio * prod.cantidad;
    contador += prod.cantidad;
    itemsDiv.innerHTML += `
      <div style="border-bottom:1px solid #eee; padding:10px 0;">
        <strong>${prod.nombre}</strong><br>
        $${prod.precio} x ${prod.cantidad}<br>
        <button onclick="sumar(${i})" style="padding:2px 8px;">+</button>
        <button onclick="restar(${i})" style="padding:2px 8px;">-</button>
      </div>`;
  });
  document.getElementById("total").innerHTML = "Total: $" + total;
  document.getElementById("contador").innerHTML = contador;
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  fly.style.width = rect.width + "px"; fly.style.left = rect.left + "px"; fly.style.top = rect.top + "px";
  fly.classList.add("flyImg"); document.body.appendChild(fly);
  let cartRect = document.getElementById("carritoIcono").getBoundingClientRect();
  setTimeout(() => { fly.style.left = cartRect.left + "px"; fly.style.top = cartRect.top + "px"; fly.style.width = "20px"; fly.style.opacity = "0"; }, 50);
  setTimeout(() => fly.remove(), 800);

  let item = carrito.find(p => p.nombre === nombre);
  if(item) item.cantidad++;
  else carrito.push({nombre, precio, cantidad: 1});
  actualizar();
}

function sumar(i){ carrito[i].cantidad++; actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad <= 0) carrito.splice(i,1); actualizar(); }
function vaciar(){ carrito = []; actualizar(); }
actualizar();
</script>
</body>
</html>
