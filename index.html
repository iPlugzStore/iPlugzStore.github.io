<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iplugz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow-x:hidden;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#ffffff;
  color:#111;
}

/* HEADER */
header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
  position:relative;
  z-index:10;
}

.logo{
  font-size:22px;
  font-weight:600;
  letter-spacing:1px;
}

#carritoIcono{
  cursor:pointer;
  position:relative;
  font-size:20px;
}

#contador{
  position:absolute;
  top:-8px;
  right:-10px;
  background:#111;
  color:white;
  border-radius:50%;
  padding:3px 6px;
  font-size:12px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:24px;
  font-weight:500;
}

.hero p{
  color:#666;
  margin-top:10px;
}

/* PRODUCTOS */
.productos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
  box-sizing:border-box;
}

.producto{
  width:100%;
  max-width:260px;
  text-align:center;
  box-sizing:border-box;
}

.producto img{
  width:100%;
  border-radius:20px;
  transition:0.3s;
}

.producto img:hover{
  transform:scale(1.05);
}

.producto h3{
  margin:15px 0 5px;
  font-weight:500;
}

.producto p{
  color:#666;
}

button{
  background:#111;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
}

button:hover{
  background:#333;
}

/* CARRITO */
#carrito{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
  z-index:20;
}

#carrito.abierto{
  right:0;
}

.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.eliminar{
  background:#e53935;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <div class="logo">iplugz</div>
  <div id="carritoIcono" onclick="abrirCarrito()">
    🛒
    <span id="contador">0</span>
  </div>
</header>

<div class="hero">
  <h1>Accesorios Premium</h1>
  <p>Calidad • Precio • Confianza</p>
</div>

<div class="productos">

  <div class="producto">
    <img src="https://via.placeholder.com/300x300.png?text=Airpods+Pro+2" alt="Airpods Pro 2">
    <h3>Airpods Pro 2</h3>
    <p>$35.000</p>
    <button onclick="agregar('Airpods Pro 2',35000)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300x300.png?text=Airpods+Maxx" alt="Airpods Maxx">
    <h3>Airpods Maxx</h3>
    <p>$45.000</p>
    <button onclick="agregar('Airpods Maxx',45000)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/300x300.png?text=Cable+USB+C" alt="Cable USB C">
    <h3>Cable USB C + Cabezal</h3>
    <p>$18.000</p>
    <button onclick="agregar('Cable USB C',18000)">Agregar al carrito</button>
  </div>

</div>

<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="cerrarCarrito()">Cerrar</button>
  <button onclick="vaciar()">Vaciar</button>
</div>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardar(){ localStorage.setItem("carrito", JSON.stringify(carrito)); }

function agregar(nombre,precio){
  var encontrado=false;
  for(var i=0;i<carrito.length;i++){
    if(carrito[i].nombre===nombre){
      carrito[i].cantidad++;
      encontrado=true;
    }
  }
  if(!encontrado){
    carrito.push({nombre:nombre,precio:precio,cantidad:1});
  }
  guardar();
  actualizar();
}

function actualizar(){
  var itemsDiv=document.getElementById("items");
  var total=0;
  var contador=0;
  itemsDiv.innerHTML="";
  for(var i=0;i<carrito.length;i++){
    total+=carrito[i].precio*carrito[i].cantidad;
    contador+=carrito[i].cantidad;
    itemsDiv.innerHTML+="<div class='item'>"+
      carrito[i].nombre+"<br>$"+
      carrito[i].precio+" x "+
      carrito[i].cantidad+
      "<br><button onclick='sumar("+i+")'>+</button>"+
      "<button onclick='restar("+i+")'>-</button>"+
      "<button class='eliminar' onclick='eliminar("+i+")'>Eliminar</button></div>";
  }
  document.getElementById("total").innerHTML="Total: $"+total;
  document.getElementById("contador").innerHTML=contador;
}

function sumar(i){ carrito[i].cantidad++; guardar(); actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad<=0){ carrito.splice(i,1); } guardar(); actualizar(); }
function eliminar(i){ carrito.splice(i,1); guardar(); actualizar(); }
function vaciar(){ carrito=[]; guardar(); actualizar(); }

function abrirCarrito(){ document.getElementById("carrito").classList.add("abierto"); }
function cerrarCarrito(){ document.getElementById("carrito").classList.remove("abierto"); }

actualizar();
</script>

</body>
</html>
