<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* BASE */
html, body { margin:0; padding:0; font-family:'Helvetica Neue', sans-serif; background:#f5f6fa; color:#111; overflow-x:hidden; scroll-behavior:smooth; transition: background 0.3s, color 0.3s; }
.contenedor { max-width:1100px; margin:0 auto; padding:0 16px; }
a { text-decoration:none; color:inherit; }

/* HEADER FIJO */
header {
  position: fixed; top:0; left:0; width:100%;
  background: #111; padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
  color:white; z-index:1000; box-shadow:0 5px 15px rgba(0,0,0,0.2); transition: background 0.3s;
}
.logo {
  font-size:32px; font-weight:900; text-transform:uppercase;
  background: linear-gradient(90deg,#4A90E2,#50E3C2);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  transition: background 0.3s;
}
#carritoIcono { font-size:26px; position:relative; cursor:pointer; }
#contador { position:absolute; top:-6px; right:-10px; background:#50E3C2; color:white; padding:3px 7px; border-radius:50%; font-size:12px; font-weight:bold; transition: transform 0.3s ease; }

/* ESPACIO HEADER */
body > .contenido { padding-top:100px; }

/* HERO CON PARALLAX Y DEGRADADO ANIMADO */
.hero {
  text-align:center; padding:120px 20px; border-radius:0 0 30% 30% / 0 0 10% 10%; margin-bottom:40px; color:white;
  background: linear-gradient(135deg,#4A90E2,#50E3C2);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  box-shadow:0 5px 25px rgba(0,0,0,0.15);
  position:relative; overflow:hidden;
}
@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.hero h1 { font-size:38px; margin-bottom:12px; }
.hero p { font-size:18px; }

/* PRODUCTOS */
.productos {
  display:flex; flex-wrap:wrap; justify-content:center; gap:24px; padding-bottom:60px;
}
.producto {
  background:#fff; border-radius:24px; box-shadow:0 8px 20px rgba(0,0,0,0.07);
  overflow:hidden; width:100%; max-width:260px; text-align:center; transition: transform 0.3s, box-shadow 0.3s, opacity 0.6s;
  opacity:0; transform: translateY(30px);
}
.producto.visible { opacity:1; transform: translateY(0); transition: transform 0.6s ease, opacity 0.6s ease; }
.producto:hover { transform: translateY(-8px); box-shadow:0 18px 35px rgba(0,0,0,0.25); }
.producto img { width:100%; border-radius:20px; transition: transform 0.3s, box-shadow 0.3s; cursor:pointer; }
.producto img:hover { transform: scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.2); }
.producto h3 { margin:12px 0 6px; font-size:20px; color:#111; }
.producto p { color:#666; font-size:16px; margin:0; }

/* BOTONES */
button {
  width:100%; padding:12px; margin-top:10px; border:none; border-radius:24px;
  font-size:16px; font-weight:bold; background:#50E3C2; color:#fff;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
button:hover { background:#417D9C; transform: scale(1.05); box-shadow:0 5px 15px rgba(0,0,0,0.2); }

/* CARRITO */
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:none; z-index:999; }
#carrito {
  position:fixed; top:0; right:0; width:85%; max-width:280px; height:100%;
  background:white; box-shadow:-5px 0 25px rgba(0,0,0,0.3); padding:20px;
  transform: translateX(100%); transition: transform 0.3s ease; overflow-y:auto; z-index:1000;
}
#carrito.abierto { transform: translateX(0); }
.item { border-bottom:1px solid #eee; padding:10px 0; font-weight:500; }
.item button { width:30px; height:30px; font-size:16px; margin-right:5px; }
.eliminar { background:#417D9C; width:100%; margin-top:5px; color:white; }

/* BOTON FLOTANTE CARRITO */
#btnFlotante {
  position:fixed; bottom:30px; right:20px; background:#50E3C2; color:#fff; border:none;
  padding:14px 18px; border-radius:50px; font-size:18px; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.2); transition: transform 0.2s, background 0.3s; z-index:1001;
}
#btnFlotante:hover { transform: scale(1.1); background:#417D9C; }

/* FLY TO CART */
.flyImg { position:absolute; width:100px; height:100px; border-radius:20px; z-index:10000; pointer-events:none; transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out; }

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:30px 20px; }
footer a { color:#50E3C2; margin:0 10px; transition: color 0.3s; }
footer a:hover { color:#417D9C; }

</style>
</head>
<body>

<header class="contenedor">
  <div class="logo">iPlugz</div>
  <div id="carritoIcono">🛒<span id="contador">0</span></div>
</header>

<div class="contenido contenedor">
  <div class="hero">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>

  <h2 style="text-align:center; margin-bottom:20px;">Destacados</h2>
  <div class="productos">
    <div class="producto"><a href="airpods-pro2.html"><img src="airpods-pro2.JPG" alt="Airpods Pro 2"></a><h3>Airpods Pro 2</h3><p>$35.000</p><button onclick="agregar('Airpods Pro 2',35000,this)">Agregar al carrito</button></div>
    <div class="producto"><a href="airpods-maxx.html"><img src="airpods-maxx.JPG" alt="Airpods Maxx"></a><h3>Airpods Maxx</h3><p>$45.000</p><button onclick="agregar('Airpods Maxx',45000,this)">Agregar al carrito</button></div>
    <div class="producto"><a href="cable-usb-c.html"><img src="cable-usb-c.JPG" alt="Cable USB C"></a><h3>Cable USB C + Cabezal</h3><p>$18.000</p><button onclick="agregar('Cable USB C',18000,this)">Agregar al carrito</button></div>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Carrito</button>
<div id="overlay" onclick="cerrarCarrito()"></div>

<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="cerrarCarrito()">Cerrar</button>
  <button onclick="vaciar()">Vaciar</button>
</div>

<footer>
  &copy; 2026 iPlugz • <a href="#">Facebook</a> • <a href="#">Instagram</a> • <a href="#">Twitter</a>
</footer>

<script>
var carrito = JSON.parse(localStorage.getItem("carrito")) || [];
var productos = document.querySelectorAll('.producto');
document.getElementById("carritoIcono").onclick = abrirCarrito;
document.getElementById("btnFlotante").onclick = abrirCarrito;

// Animación aparición productos al scrollear
function checkVisible() {
  let triggerBottom = window.innerHeight * 0.85;
  productos.forEach(p=>{
    let rect = p.getBoundingClientRect();
    if(rect.top < triggerBottom) p.classList.add('visible');
  });
}
window.addEventListener('scroll', checkVisible);
checkVisible();

function guardar(){ localStorage.setItem("carrito", JSON.stringify(carrito)); }

function actualizar(){
  let itemsDiv = document.getElementById("items");
  let total = 0;
  let contador = 0;
  itemsDiv.innerHTML = "";
  for(let i=0;i<carrito.length;i++){
    total += carrito[i].precio*carrito[i].cantidad;
    contador += carrito[i].cantidad;
    itemsDiv.innerHTML += "<div class='item'>"+
      carrito[i].nombre+"<br>$"+
      carrito[i].precio+" x "+
      carrito[i].cantidad+
      "<br><button onclick='sumar("+i+")'>+</button>"+
      "<button onclick='restar("+i+")'>-</button>"+
      "<button class='eliminar' onclick='eliminar("+i+")'>Eliminar</button></div>";
  }
  document.getElementById("total").innerHTML = "Total: $" + total;
  let counter = document.getElementById("contador");
  counter.innerHTML = contador;
  counter.style.transform = "scale(1.5)";
  setTimeout(()=>{ counter.style.transform = "scale(1)"; },300);
}

// Fly-to-cart
function agregar(nombre, precio, btn){
  let img = btn.parentElement.querySelector("img");
  let fly = img.cloneNode(true);
  let rect = img.getBoundingClientRect();
  fly.style.position="fixed"; fly.style.left=rect.left+"px"; fly.style.top=rect.top+"px"; fly.style.width=rect.width+"px"; fly.style.height=rect.height+"px";
  fly.classList.add("flyImg"); document.body.appendChild(fly);
  let cartIcon = document.getElementById("carritoIcono"); let cartRect = cartIcon.getBoundingClientRect();
  setTimeout(()=>{ fly.style.left=cartRect.left+"px"; fly.style.top=cartRect.top+"px"; fly.style.width="20px"; fly.style.height="20px"; fly.style.opacity=0; },10);
  setTimeout(()=>{ document.body.removeChild(fly); },800);

  let encontrado=false;
  for(let i=0;i<carrito.length;i++){ if(carrito[i].nombre===nombre){ carrito[i].cantidad++; encontrado=true; } }
  if(!encontrado){ carrito.push({nombre:nombre,precio:precio,cantidad:1}); }
  guardar(); actualizar();
}

function sumar(i){ carrito[i].cantidad++; guardar(); actualizar(); }
function restar(i){ carrito[i].cantidad--; if(carrito[i].cantidad<=0){ carrito.splice(i,1); } guardar(); actualizar(); }
function eliminar(i){ carrito.splice(i,1); guardar(); actualizar(); }
function vaciar(){ carrito=[]; guardar(); actualizar(); }
function abrirCarrito(){ document.getElementById("carrito").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function cerrarCarrito(){ document.getElementById("carrito").classList.remove("abierto"); document.getElementById("overlay").style.display="none"; }
actualizar();
</script>
</body>
</html>
