<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Experience Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
:root {
  --blue: #4A90E2;
  --teal: #50E3C2;
  --gradient: linear-gradient(90deg, var(--blue), var(--teal));
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #111;
  --shadow: 0 15px 35px rgba(0,0,0,0.1);
}

body.dark-mode {
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --text: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

body { 
  margin:0; padding:0; 
  font-family: 'SF Pro Display', -apple-system, sans-serif; 
  background: var(--bg); color: var(--text); 
  overflow-x:hidden; transition: 0.3s;
}

/* BARRA DE ANUNCIOS */
.top-bar {
  background: #000; color: #fff; height: 35px;
  display: flex; align-items: center; overflow: hidden;
  position: fixed; top: 0; width: 100%; z-index: 1100;
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
}
.marquee { display: flex; white-space: nowrap; animation: marquee 20s linear infinite; }
.marquee span { padding: 0 30px; text-transform: uppercase; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* HEADER MEJORADO */
header {
  position: fixed; top:35px; left:0; width:100%;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  padding: 12px 20px; color: var(--text); z-index: 1000;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
body.dark-mode header { background: rgba(26, 26, 26, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); }

.header-content { 
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto;
}
.logo { font-size: 22px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.icon-header { font-size: 24px; cursor: pointer; display: flex; align-items: center; }

/* HERO */
.hero {
  position: relative; text-align:center; padding: 150px 20px 80px; 
  border-radius: 0 0 50px 50px; color:white; margin-bottom:40px;
  background: #000; overflow: hidden;
}
.hero h1 { font-size: 40px; margin: 0; font-weight: 800; line-height: 1.1; }
.hero p { font-size: 16px; opacity: 0.8; margin-top: 15px; letter-spacing: 1px; }

/* PRODUCTOS - IMÁGENES COMPLETAS */
.productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 0 15px 120px; }
.producto {
  background: var(--card); border-radius: 30px; overflow: hidden; 
  text-align: center; width: 100%; max-width: 320px; box-shadow: var(--shadow);
  transition: 0.3s;
}
.producto img { 
  width: 100%; height: 300px; 
  object-fit: contain; /* Esto asegura que la foto se vea COMPLETA */
  background: #fff; padding: 20px;
}
.producto-info { padding: 20px; }
.btn-agregar {
  width: 100%; padding: 14px; border: none; border-radius: 20px;
  background: #000; color: white; font-weight: bold; cursor: pointer;
}
body.dark-mode .btn-agregar { background: #fff; color: #000; }

/* BOTÓN WHATSAPP FLOTANTE (DERECHA) */
.wsp-flotante {
  position: fixed; bottom: 25px; right: 20px;
  background: #25d366; color: white;
  width: 60px; height: 60px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 1500; text-decoration: none;
  transition: 0.3s;
}
.wsp-flotante:hover { transform: scale(1.1); }

/* BOTÓN CARRITO FLOTANTE (IZQUIERDA) */
.cart-flotante {
  position: fixed; bottom: 25px; left: 20px;
  background: var(--blue); color: white;
  padding: 15px 25px; border-radius: 50px;
  display: flex; align-items: center; gap: 10px;
  font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  z-index: 1500; cursor: pointer;
}

/* SIDEBARS */
.sidebar {
  position:fixed; top:0; right:0; width:100%; max-width:400px; height:100%;
  background: var(--card); z-index: 2000; padding: 30px;
  transform: translateX(100%); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
}
.sidebar.abierto { transform: translateX(0); }
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; z-index:1999; backdrop-filter: blur(5px); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="marquee">
    <span>⚡ ENVÍOS A TODO EL PAÍS</span>
    <span>🔥 10% OFF POR TRANSFERENCIA</span>
    <span>📦 DESCUENTOS LLEVANDO 3 PRODUCTOS</span>
    <span>⚡ ENVÍOS A TODO EL PAÍS</span>
  </div>
</div>

<header>
  <div class="header-content">
    <div class="icon-header" onclick="abrirMenu()">☰</div>
    <a href="#" class="logo">iPlugz</a>
    <div class="icon-header" onclick="abrirCarrito()">🛒<span id="contador" style="font-size:12px; margin-left:4px">0</span></div>
  </div>
</header>

<div class="hero">
  <div class="hero-content">
    <h1>Accesorios<br>Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>
</div>

<main class="productos" id="lista">
  </main>

<a href="https://wa.me/5491127081095" class="wsp-flotante" target="_blank">
  <svg width="35" height="35" fill="currentColor" viewBox="0 0 16 16">
    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
  </svg>
</a>

<div class="cart-flotante" onclick="abrirCarrito()">
  <span>🛒</span> <span id="cart-count">0</span> Productos
</div>

<div id="overlay" onclick="cerrarTodo()"></div>

<div id="carrito" class="sidebar">
  <h2>Tu Carrito</h2>
  <div id="items" style="max-height: 60vh; overflow-y:auto"></div>
  <h3 id="total">Total: $0</h3>
  <button class="btn-agregar" onclick="irAFormulario()">COMPRAR AHORA</button>
</div>

<script>
const DB = [
  { id: 1, nombre: "Airpods Pro 2", precio: 35000, img: "airpods-pro2.JPG" },
  { id: 2, nombre: "Airpods Maxx", precio: 45000, img: "airpods-maxx.JPG" },
  { id: 3, nombre: "Cable USB C + Cabezal", precio: 18000, img: "cable-usb-c.JPG" }
];

let carrito = [];

function render() {
  document.getElementById("lista").innerHTML = DB.map(p => `
    <div class="producto">
      <img src="${p.img}">
      <div class="producto-info">
        <h3>${p.nombre}</h3>
        <p style="font-weight:bold; color:var(--blue); font-size:20px">$${p.precio.toLocaleString()}</p>
        <button class="btn-agregar" onclick="agregar(${p.id})">Añadir al carrito</button>
      </div>
    </div>
  `).join('');
}

function agregar(id) {
  const p = DB.find(x => x.id === id);
  carrito.push(p);
  actualizar();
}

function actualizar() {
  document.getElementById("contador").innerText = carrito.length;
  document.getElementById("cart-count").innerText = carrito.length;
  // Lógica de total y render de items de carrito aquí...
}

function abrirCarrito() { document.getElementById("carrito").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function cerrarTodo() { document.querySelectorAll(".sidebar").forEach(s => s.classList.remove("abierto")); document.getElementById("overlay").style.display="none"; }

render();
</script>

</body>
</html>
