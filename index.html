<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>iPlugz - Accesorios Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* VARIABLES ORIGINALES */
:root {
  --blue: #4A90E2;
  --teal: #50E3C2;
  --gradient: linear-gradient(90deg, var(--blue), var(--teal));
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #111;
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
}

body.dark-mode {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
  margin:0; padding:0; 
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  background: var(--bg); color: var(--text); 
  overflow-x:hidden; transition: 0.3s;
}

.contenedor { max-width:1100px; margin:0 auto; padding:0 20px; }

/* HEADER PREMIUM CON BUSCADOR */
header {
  position: fixed; top:0; left:0; width:100%;
  background: linear-gradient(90deg, rgba(74, 144, 226, 0.9), rgba(80, 227, 194, 0.9));
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 15px 0; color: white; z-index: 1000;
}

.header-content { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
#menuIcono { font-size: 28px; cursor: pointer; justify-self: start; }
.logo { font-size: 26px; font-weight: 900; text-transform: uppercase; justify-self: center; letter-spacing: 1px; }
#carritoIcono { font-size:24px; cursor:pointer; justify-self: end; position:relative; }
#contador { position:absolute; top:-6px; right:-12px; background: white; color: var(--blue); padding:2px 6px; border-radius:50%; font-size:11px; font-weight:bold; }

/* HERO CON PARTÍCULAS */
.hero {
  position: relative; text-align:center; padding:110px 20px 70px; 
  border-radius: 0 0 50px 50px; color:white; margin-bottom:40px;
  background: var(--gradient); overflow: hidden;
}
#particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.hero-content { position: relative; z-index: 2; }
.hero h1 { font-size: 38px; margin: 0; }
.hero p { font-size: 18px; opacity: 0.9; margin-top: 10px; }

/* PRODUCTOS */
.productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding-bottom: 120px; }
.producto {
  background: var(--card); border-radius: 24px; overflow: hidden; 
  text-align: center; width: 100%; max-width: 280px; box-shadow: var(--shadow); transition: 0.4s;
}
.producto img { width: 100%; display: block; }
.btn-agregar {
  width: 90%; padding: 12px; margin: 15px 0 20px; border: none; border-radius: 24px;
  background: var(--teal); color: white; font-weight: bold; cursor: pointer;
}

/* SIDEBARS */
.sidebar {
  position:fixed; top:0; right:0; width:85%; max-width:350px; height:100%;
  background: var(--card); z-index: 2000; padding: 25px;
  transform: translateX(100%); transition: 0.3s ease; overflow-y:auto;
}
.sidebar.abierto { transform: translateX(0); }
#menuLateral { left:0; transform: translateX(-100%); }
#menuLateral.abierto { transform: translateX(0); }

#overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; z-index:1999; backdrop-filter: blur(3px); }

/* BOTON FLOTANTE ORIGINAL */
#btnFlotante {
  position:fixed; bottom:25px; left: 50%; transform: translateX(-50%);
  background: var(--blue); color:#fff; border:none; 
  padding:16px 35px; border-radius:50px; 
  font-size:17px; font-weight:bold; box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
  z-index:900; cursor:pointer;
}

/* FORMULARIO */
.form-group { margin-bottom: 15px; text-align: left; }
.form-group label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
.form-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: var(--bg); color: var(--text); }

.skeleton { background: #eee; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="header-content contenedor">
    <div id="menuIcono" onclick="abrirMenu()">☰</div>
    <div class="logo">iPlugz</div>
    <div id="carritoIcono" onclick="abrirCarrito()">🛒<span id="contador">0</span></div>
  </div>
</header>

<div id="menuLateral" class="sidebar">
  <div style="font-size:30px; cursor:pointer; text-align:right" onclick="cerrarTodo()">&times;</div>
  <div style="padding: 10px 0; display: flex; justify-content: space-between;">
    <span>Modo Oscuro</span>
    <input type="checkbox" id="darkSwitch" onchange="toggleDark()">
  </div>
  <ul style="list-style:none; padding:0; margin-top:20px;">
    <li><h3 onclick="cerrarTodo()">Inicio</h3></li>
    <li><h3 onclick="cerrarTodo()">Productos</h3></li>
  </ul>
</div>

<div class="hero">
  <canvas id="particles-canvas"></canvas>
  <div class="hero-content">
    <h1>Accesorios Premium</h1>
    <p>Calidad • Precio • Confianza</p>
  </div>
</div>

<div class="contenedor">
  <div class="productos" id="lista">
    <div class="producto skeleton" style="height:350px"></div>
    <div class="producto skeleton" style="height:350px"></div>
  </div>
</div>

<div id="carrito" class="sidebar">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Carrito</h3>
    <span onclick="cerrarTodo()" style="cursor:pointer; font-size:24px;">&times;</span>
  </div>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="btn-agregar" onclick="irAFormulario()">Continuar</button>
  <button onclick="vaciar()" style="width:100%; background:none; border:none; color:red; cursor:pointer;">Vaciar carrito</button>
</div>

<div id="checkout" class="sidebar">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Tus Datos</h3>
    <span onclick="abrirCarrito()" style="color:var(--blue); cursor:pointer; font-weight:bold;">Volver</span>
  </div>
  <div style="margin-top:20px;">
    <div class="form-group"><label>Nombre Completo</label><input type="text" id="f-nom" placeholder="Ej: Juan Perez"></div>
    <div class="form-group"><label>Dirección</label><input type="text" id="f-dir" placeholder="Ej: Av. Rivadavia 1234"></div>
    <div class="form-group"><label>Teléfono</label><input type="tel" id="f-tel" placeholder="Ej: 11 2708 1095"></div>
    <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="Ej: juan@gmail.com"></div>
    <button class="btn-agregar" onclick="finalizar()">Confirmar por WhatsApp</button>
  </div>
</div>

<button id="btnFlotante" onclick="abrirCarrito()">🛒 Carrito</button>
<div id="overlay" onclick="cerrarTodo()"></div>

<script>
const DB = [
  { id: 1, nombre: "Airpods Pro 2", precio: 35000, img: "airpods-pro2.JPG" },
  { id: 2, nombre: "Airpods Maxx", precio: 45000, img: "airpods-maxx.JPG" },
  { id: 3, nombre: "Cable USB C + Cabezal", precio: 18000, img: "cable-usb-c.JPG" }
];

let carrito = JSON.parse(localStorage.getItem("iplugz_c")) || [];

window.onload = () => {
  if(localStorage.getItem("iplugz_d") === "true") {
    document.body.classList.add("dark-mode");
    document.getElementById("darkSwitch").checked = true;
  }
  setTimeout(() => { render(); initParticles(); }, 1200);
  actualizar();
};

function render() {
  document.getElementById("lista").innerHTML = DB.map(p => `
    <div class="producto">
      <img src="${p.img}">
      <h3>${p.nombre}</h3>
      <p>$${p.precio.toLocaleString()}</p>
      <button class="btn-agregar" onclick="agregar(${p.id})">Agregar al carrito</button>
    </div>
  `).join('');
}

function agregar(id) {
  const p = DB.find(x => x.id === id);
  const ex = carrito.find(x => x.id === id);
  if(ex) ex.qty++; else carrito.push({...p, qty:1});
  actualizar();
  abrirCarrito();
}

function actualizar() {
  const cont = document.getElementById("items");
  let t = 0; let n = 0;
  cont.innerHTML = carrito.map((x, i) => {
    t += x.precio * x.qty; n += x.qty;
    return `<div style="border-bottom:1px solid #eee; padding:10px 0;">
      <b>${x.nombre}</b> (x${x.qty})<br>$${(x.precio*x.qty).toLocaleString()}
      <button onclick="cambiar(${i}, -1)">-</button><button onclick="cambiar(${i}, 1)">+</button>
    </div>`;
  }).join('');
  document.getElementById("total").innerText = "Total: $" + t.toLocaleString();
  document.getElementById("contador").innerText = n;
  localStorage.setItem("iplugz_c", JSON.stringify(carrito));
}

function cambiar(i, d) {
  carrito[i].qty += d;
  if(carrito[i].qty <= 0) carrito.splice(i,1);
  actualizar();
}

function vaciar() { carrito = []; actualizar(); }

function abrirMenu() { cerrarTodo(); document.getElementById("menuLateral").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function abrirCarrito() { cerrarTodo(); document.getElementById("carrito").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function irAFormulario() { if(carrito.length===0) return alert("Carrito vacío"); cerrarTodo(); document.getElementById("checkout").classList.add("abierto"); document.getElementById("overlay").style.display="block"; }
function cerrarTodo() { 
  document.querySelectorAll(".sidebar").forEach(s => s.classList.remove("abierto"));
  document.getElementById("overlay").style.display="none"; 
}

function toggleDark() {
  const d = document.body.classList.toggle("dark-mode");
  localStorage.setItem("iplugz_d", d);
}

function finalizar() {
  const nom = document.getElementById("f-nom").value;
  const dir = document.getElementById("f-dir").value;
  const tel = document.getElementById("f-tel").value;
  if(!nom || !dir || !tel) return alert("Completa los datos");

  let msg = `*NUEVO PEDIDO iPlugz*\n\n`;
  msg += `👤 Cliente: ${nom}\n📍 Dirección: ${dir}\n📞 Tel: ${tel}\n\n`;
  let tot = 0;
  carrito.forEach(x => {
    msg += `• ${x.nombre} (x${x.qty})\n`;
    tot += x.precio * x.qty;
  });
  msg += `\n*TOTAL: $${tot.toLocaleString()}*`;
  
  window.open(`https://wa.me/5491127081095?text=${encodeURIComponent(msg)}`, '_blank');
}

function initParticles() {
  const canvas = document.getElementById("particles-canvas");
  const ctx = canvas.getContext("2d");
  let w = canvas.width = window.innerWidth, h = canvas.height = 350;
  let pts = Array.from({length: 40}, () => ({x: Math.random()*w, y: Math.random()*h, vx: Math.random()-0.5, vy: Math.random()-0.5}));
  function anim() {
    ctx.clearRect(0,0,w,h); ctx.fillStyle = "rgba(255,255,255,0.4)";
    pts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(anim);
  }
  anim();
}
</script>
</body>
</html>
