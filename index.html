<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>iPlugz - Experience Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --blue: #4A90E2;
            --teal: #50E3C2;
            --gradient: linear-gradient(135deg, var(--blue), var(--teal));
            --bg: #f8f9fd;
            --card: #ffffff;
            --text: #111111;
            --text-alt: #666666;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --header-blur: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-alt: #aaaaaa;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --header-blur: rgba(15, 15, 15, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.3s, color 0.3s;
        }

        .contenedor { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--header-blur); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(128,128,128,0.1); transition: all 0.3s;
        }

        .nav-grid {
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; height: 70px;
        }

        .nav-left { display: flex; gap: 20px; align-items: center; }
        .nav-right { display: flex; justify-content: flex-end; align-items: center; }

        .icon-btn { 
            background: none; border: none; font-size: 24px; cursor: pointer; 
            color: var(--text); transition: transform 0.2s; padding: 5px;
        }

        .logo {
            font-size: 22px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #contador {
            position: absolute; top: -5px; right: -8px;
            background: var(--blue); color: white;
            font-size: 10px; padding: 2px 6px; border-radius: 10px;
            font-weight: bold; border: 2px solid var(--bg);
        }

        /* BUSCADOR */
        #searchBox {
            position: absolute; top: 70px; left: 0; width: 100%;
            background: var(--card); padding: 15px;
            display: none; box-shadow: var(--shadow);
        }
        #searchBox input {
            width: 100%; max-width: 800px; margin: 0 auto; display: block;
            padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(128,128,128,0.2);
            background: var(--bg); color: var(--text); font-size: 16px;
        }

        /* HERO & PARTICLES */
        .hero {
            position: relative; height: 400px; display: flex; align-items: center;
            justify-content: center; text-align: center; color: white;
            background: var(--gradient); overflow: hidden; margin-bottom: 40px;
            border-radius: 0 0 50px 50px;
        }
        #particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hero-text { position: relative; z-index: 2; padding: 0 20px; }
        .hero h1 { font-size: 42px; margin: 0; font-weight: 800; }
        .hero p { font-size: 18px; opacity: 0.9; margin-top: 10px; }

        /* PRODUCTOS & SKELETON */
        .grid-productos {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; padding-bottom: 100px;
        }

        .card {
            background: var(--card); border-radius: 30px; overflow: hidden;
            box-shadow: var(--shadow); transition: transform 0.3s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        .card h3 { margin: 0; font-size: 20px; color: var(--text); }
        .card .precio { color: var(--blue); font-weight: bold; font-size: 22px; margin: 10px 0; }

        .btn-add {
            width: 100%; padding: 15px; border: none; border-radius: 20px;
            background: var(--gradient); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: opacity 0.3s;
        }

        .skeleton { background: #eee; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        body.dark-mode .skeleton { background: #222; }

        /* SIDEBARS */
        .sidebar {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--card); z-index: 2000; padding: 30px;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar-left { left: 0; right: auto; transform: translateX(-100%); }
        .sidebar-left.active { transform: translateX(0); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500; display: none;
            backdrop-filter: blur(4px);
        }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(128,128,128,0.1);
        }
        .qty-btns { display: flex; align-items: center; gap: 10px; }
        .qty-btns button { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: none; color: var(--text); cursor: pointer; }

        /* BOTON FLOTANTE */
        #btnFlotante {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--blue); color: white; border: none;
            padding: 16px 40px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.4); z-index: 1100; cursor: pointer;
        }

        .fly-item {
            position: fixed; z-index: 9999; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px; object-fit: cover;
        }

        footer { background: #000; color: white; text-align: center; padding: 60px 20px 120px; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 32px; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="contenedor nav-grid">
            <div class="nav-left">
                <button class="icon-btn" onclick="toggleSidebar('menuLateral')">☰</button>
                <button class="icon-btn" onclick="toggleSearch()">🔍</button>
            </div>
            <div class="logo">iPlugz</div>
            <div class="nav-right">
                <button class="icon-btn" style="position:relative" onclick="toggleSidebar('cartSidebar')">
                    🛒 <span id="contador">0</span>
                </button>
            </div>
        </div>
        <div id="searchBox">
            <input type="text" id="searchInp" placeholder="Buscar productos..." onkeyup="filtrarProductos()">
        </div>
    </header>

    <div id="menuLateral" class="sidebar sidebar-left">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" style="background:none; -webkit-text-fill-color:var(--text);">Menú</div>
            <button class="icon-btn" onclick="closeAll()">✕</button>
        </div>
        <div style="margin-top:40px;">
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(128,128,128,0.1); padding:15px; border-radius:15px;">
                <span>Modo Oscuro</span>
                <input type="checkbox" id="darkModeSwitch" onchange="toggleDarkMode()">
            </div>
        </div>
        <nav style="margin-top:30px; display:flex; flex-direction:column; gap:20px;">
            <a href="#" style="text-decoration:none; color:var(--text); font-size:18px;">Inicio</a>
            <a href="#" style="text-decoration:none; color:var(--text); font-size:18px;">Productos</a>
            <a href="#" style="text-decoration:none; color:var(--text); font-size:18px;">Novedades</a>
            <a href="#" style="text-decoration:none; color:var(--text); font-size:18px;">Contacto</a>
        </nav>
    </div>

    <div id="cartSidebar" class="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" style="background:none; -webkit-text-fill-color:var(--text);">Carrito</div>
            <button class="icon-btn" onclick="closeAll()">✕</button>
        </div>
        <div id="cartContent" style="margin-top:30px; flex-grow: 1; overflow-y: auto;"></div>
        <div style="padding-top:20px; border-top:1px solid rgba(128,128,128,0.2);">
            <h3 id="cartTotal">Total: $0</h3>
            <button class="btn-add" onclick="finalizarCompra()">Finalizar por WhatsApp</button>
            <button onclick="vaciarCarrito()" style="width:100%; background:none; border:none; color:red; margin-top:15px; cursor:pointer;">Vaciar Todo</button>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <section class="hero">
        <canvas id="particles-canvas"></canvas>
        <div class="hero-text">
            <h1>Accesorios Premium</h1>
            <p>Calidad • Precio • Confianza</p>
        </div>
    </section>

    <main class="contenedor">
        <h2 style="margin-bottom:30px;">Destacados</h2>
        <div class="grid-productos" id="listaProductos">
            <div class="card skeleton" style="height:400px"></div>
            <div class="card skeleton" style="height:400px"></div>
            <div class="card skeleton" style="height:400px"></div>
        </div>
    </main>

    <button id="btnFlotante" onclick="toggleSidebar('cartSidebar')">🛒 Carrito</button>

    <footer>
        <div class="logo">iPlugz</div>
        <p>&copy; 2026 iPlugz Argentina</p>
    </footer>

    <script>
        const PRODUCTOS_DB = [
            { id: 1, nombre: "Airpods Pro 2", precio: 35000, img: "airpods-pro2.JPG" },
            { id: 2, nombre: "Airpods Maxx", precio: 45000, img: "airpods-maxx.JPG" },
            { id: 3, nombre: "Cable USB C + Cabezal", precio: 18000, img: "cable-usb-c.JPG" }
        ];

        let carrito = JSON.parse(localStorage.getItem('iplugz_cart')) || [];
        let darkMode = localStorage.getItem('iplugz_dark') === 'true';

        window.addEventListener('DOMContentLoaded', () => {
            if (darkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeSwitch').checked = true;
            }
            setTimeout(() => {
                renderProductos(PRODUCTOS_DB);
                initParticles();
            }, 1200);
            actualizarCarritoUI();
        });

        function renderProductos(data) {
            const container = document.getElementById('listaProductos');
            container.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.nombre}">
                    <div class="card-body">
                        <h3>${p.nombre}</h3>
                        <p class="precio">$${p.precio.toLocaleString()}</p>
                        <button class="btn-add" onclick="agregarAlCarrito(${p.id}, this)">Agregar al carrito</button>
                    </div>
                </div>
            `).join('');
        }

        function agregarAlCarrito(id, btn) {
            const prod = PRODUCTOS_DB.find(p => p.id === id);
            const enCarrito = carrito.find(item => item.id === id);

            // Animación Fly
            const img = btn.closest('.card').querySelector('img');
            const fly = img.cloneNode();
            const rect = img.getBoundingClientRect();
            fly.classList.add('fly-item');
            fly.style.top = rect.top + 'px'; fly.style.left = rect.left + 'px'; fly.style.width = rect.width + 'px';
            document.body.appendChild(fly);

            const cartIcon = document.getElementById('contador').getBoundingClientRect();
            setTimeout(() => {
                fly.style.top = cartIcon.top + 'px'; fly.style.left = cartIcon.left + 'px';
                fly.style.width = '20px'; fly.style.opacity = '0';
            }, 10);
            setTimeout(() => fly.remove(), 800);

            if (enCarrito) enCarrito.qty++;
            else carrito.push({ ...prod, qty: 1 });
            saveAndUpdate();
        }

        function actualizarCarritoUI() {
            const container = document.getElementById('cartContent');
            let total = 0; let qtyTotal = 0;

            container.innerHTML = carrito.map((item, index) => {
                total += item.precio * item.qty;
                qtyTotal += item.qty;
                return `
                    <div class="cart-item">
                        <div><strong>${item.nombre}</strong><br><small>$${item.precio.toLocaleString()}</small></div>
                        <div class="qty-btns">
                            <button onclick="changeQty(${index}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('cartTotal').innerText = `Total: $${total.toLocaleString()}`;
            document.getElementById('contador').innerText = qtyTotal;
        }

        function changeQty(index, delta) {
            carrito[index].qty += delta;
            if (carrito[index].qty <= 0) carrito.splice(index, 1);
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('iplugz_cart', JSON.stringify(carrito));
            actualizarCarritoUI();
        }

        function vaciarCarrito() { carrito = []; saveAndUpdate(); }

        function finalizarCompra() {
            if (carrito.length === 0) return alert("El carrito está vacío");
            let mensaje = "¡Hola iPlugz! 🚀 Pedido nuevo:\n\n";
            let total = 0;
            carrito.forEach(item => {
                mensaje += `• *${item.nombre}* (x${item.qty}) - $${(item.precio * item.qty).toLocaleString()}\n`;
                total += item.precio * item.qty;
            });
            mensaje += `\n*Total: $${total.toLocaleString()}*`;
            window.open(`https://wa.me/5491127081095?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        function toggleSidebar(id) {
            closeAll();
            document.getElementById(id).classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function toggleSearch() {
            const sb = document.getElementById('searchBox');
            sb.style.display = sb.style.display === 'block' ? 'none' : 'block';
            if(sb.style.display === 'block') document.getElementById('searchInp').focus();
        }

        function closeAll() {
            document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('searchBox').style.display = 'none';
        }

        function filtrarProductos() {
            const term = document.getElementById('searchInp').value.toLowerCase();
            const filtrados = PRODUCTOS_DB.filter(p => p.nombre.toLowerCase().includes(term));
            renderProductos(filtrados);
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('iplugz_dark', darkMode);
        }

        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            const resize = () => { w = canvas.width = canvas.offsetWidth; h = canvas.height = canvas.offsetHeight; };
            window.addEventListener('resize', resize); resize();
            for (let i = 0; i < 50; i++) particles.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, vx: Math.random()-0.5, vy: Math.random()-0.5 });
            const anim = () => {
                ctx.clearRect(0,0,w,h); ctx.fillStyle = 'rgba(255,255,255,0.4)';
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0) p.x=w; if(p.x>w) p.x=0; if(p.y<0) p.y=h; if(p.y>h) p.y=0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(anim);
            };
            anim();
        }
    </script>
</body>
</html>
